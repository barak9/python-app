apiVersion: apps/v1
kind: Deployment

metadata:
  name: python-app
  namespace: dev

spec:
  replicas: 2

  selector:
    matchLabels:
      app: python-app

  template:
    metadata:
      labels:
        app: python-app

    spec:
      containers:
      - name: python-app
        image: python-k8s-app
        imagePullPolicy: Never

        ports:
        - containerPort: 5000